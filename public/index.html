<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Chat</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }

    #bg {
      position: fixed;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    .app {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 450px;
      height: 650px;
      z-index: 1;

      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);

      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 16px 20px;
      color: white;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: rgba(0, 0, 0, 0.25);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .messages {
      flex: 1;
      padding: 14px;
      overflow-y: auto;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

    .msg {
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.15);
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    .msg .sender {
      font-size: 11px;
      opacity: 0.65;
      margin-bottom: 3px;
    }

    .input-row {
      display: flex;
      padding: 12px;
      gap: 8px;
      background: rgba(0, 0, 0, 0.25);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder { color: rgba(255,255,255,0.45); }
    input:focus { border-color: #48b8e3; }

    button {
      background: #48b8e3;
      border: none;
      border-radius: 12px;
      color: white;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #2da8d8; }
  </style>
</head>

<body>

<div id="bg"></div>

<div class="app">
  <div class="header">💬 Glass Chat</div>
  <div class="messages" id="messages"></div>
  <div class="input-row">
    <input id="text" placeholder="Message..." onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>
</div>

<!-- Vanta Fog — local files (place both in public/) -->
<script src="three.r134.min.js"></script>
<script src="vanta.fog.min.js"></script>

<script>
  VANTA.FOG({
    el: "#bg",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200.00,
    minWidth: 200.00,
    highlightColor: 0x48b8e3,
    midtoneColor: 0xa3cfff,
    lowlightColor: 0x28b1a6,
    baseColor: 0xffffff
  });
</script>

<!-- Socket.io — relative URL works whether local or on Render -->
<script src="/socket.io/socket.io.js"></script>

<script>
  const socket = io();
  const box = document.getElementById("messages");
  const user = "User" + Math.floor(Math.random() * 9999);

  function add(sender, text) {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<div class="sender">${sender}</div>${text}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function send() {
    const input = document.getElementById("text");
    if (!input.value.trim()) return;
    socket.emit("message", { user, text: input.value.trim() });
    input.value = "";
  }

  socket.on("message", (data) => {
    add(data.user, data.text);
  });
</script>

</body>
</html>
