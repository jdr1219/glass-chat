<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Glass Chat</title>
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<canvas id="pcanvas"></canvas>
<div id="bg"></div>

<!-- LOGIN -->
<div id="login-screen" class="screen">
  <div class="glass login-card" id="login-card">
    <div class="logo-wrap">
      <img class="logo-img" src="apple-touch-icon.png" alt="Glass Chat"/>
    </div>
    <h1 class="login-title">Glass Chat</h1>
    <p class="login-sub">A beautiful place to talk</p>
    <input class="name-input" id="name-input" type="text" placeholder="Your name..." maxlength="20" autocomplete="off" spellcheck="false"/>
    <div class="field-error" id="field-error"></div>
    <button class="join-btn" id="join-btn">Join Chat</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen" class="screen hidden">
  <div class="glass chat-card">
    <header class="chat-header">
      <div class="header-left">
        <img class="header-logo" src="favicon-32.png" alt=""/>
        <span class="header-title">Glass Chat</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="search-btn" title="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="icon-btn" id="sound-btn" title="Toggle sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
        </button>
        <button class="icon-btn" id="notif-btn" title="Toggle notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <div class="online-badge">
          <span class="pulse-dot"></span>
          <span class="online-txt" id="online-count">0 online</span>
        </div>
      </div>
    </header>

    <div class="search-bar" id="search-bar">
      <input type="text" id="search-input" placeholder="Search messages..." autocomplete="off"/>
    </div>

    <div class="messages" id="messages"></div>

    <button class="scroll-bottom-btn" id="scroll-bottom-btn" title="Jump to latest">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>

    <div class="reply-bar" id="reply-bar">
      <span class="reply-bar-text" id="reply-bar-text"></span>
      <button class="reply-bar-close" id="reply-bar-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="edit-bar" id="edit-bar">
      <span class="edit-bar-text">Editing message</span>
      <button class="reply-bar-close" id="edit-bar-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="img-preview-bar" id="img-preview-bar"></div>

    <footer class="input-area">
      <input type="file" id="img-upload" accept="image/*" style="display:none"/>
      <button class="attach-btn" id="attach-btn" title="Attach image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <textarea class="msg-input" id="msg-input" rows="1" placeholder="Message..." autocomplete="off" spellcheck="false"></textarea>
      <button class="send-btn" id="send-btn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </footer>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.fog.min.js"></script>
<script>
VANTA.FOG({el:'#bg',mouseControls:true,touchControls:true,gyroControls:false,minHeight:200,minWidth:200,
  highlightColor:0x48b8e3,midtoneColor:0xa3cfff,lowlightColor:0x28b1a6,baseColor:0xffffff});
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.body.style.height = window.visualViewport.height + 'px';
  });
}
</script>
<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
