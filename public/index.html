<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Glass Chat</title>
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --blue:#2f9fd8; --teal:#22a89c; --ink:#16263a; --ink-soft:#3c5269;
  --glass-bg: rgba(255,255,255,0.30);
  --glass-border: rgba(255,255,255,0.55);
  --own-bg: rgba(72,184,227,0.34);
  --own-border: rgba(72,184,227,0.55);
  --recv-bg: rgba(255,255,255,0.40);
  --recv-border: rgba(255,255,255,0.65);
  --spring: cubic-bezier(.34,1.56,.64,1);
  --smooth: cubic-bezier(.16,1,.3,1);
  --snappy: cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;min-height:100vh;background:#aee0f5;}
#bg{position:fixed;inset:0;z-index:0;}
#pcanvas{position:fixed;inset:0;z-index:999;pointer-events:none;}
.screen{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:16px;}
.screen.hidden{display:none;}

/* Clear glass surface */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(38px) saturate(180%);
  -webkit-backdrop-filter:blur(38px) saturate(180%);
  border:1px solid var(--glass-border);
  box-shadow:0 40px 100px rgba(20,60,90,0.18),0 10px 30px rgba(20,60,90,0.10),
    inset 0 1px 0 rgba(255,255,255,0.65), inset 0 -1px 0 rgba(255,255,255,0.15);
}

/* ══ LOGIN ══ */
.login-card{width:min(420px,100%);padding:60px 48px 52px;border-radius:36px;text-align:center;
  animation:loginEnter 1.05s var(--smooth) both;position:relative;overflow:hidden;}
.login-card::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:radial-gradient(circle at 30% 0%,rgba(255,255,255,0.55),transparent 60%);}
@keyframes loginEnter{
  0%{opacity:0;transform:translateY(90px) scale(.80) rotate(-2deg);filter:blur(20px);}
  40%{filter:blur(2px);}
  70%{transform:translateY(-8px) scale(1.02) rotate(0.4deg);}
  100%{opacity:1;transform:translateY(0) scale(1) rotate(0);filter:blur(0);}
}
@keyframes loginLeave{
  0%{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}
  100%{opacity:0;transform:translateY(50px) scale(.88) rotate(2deg);filter:blur(14px);}
}
.login-card.leaving{animation:loginLeave .42s var(--snappy) forwards;}

.logo-wrap{display:inline-block;margin-bottom:26px;position:relative;}
.logo-ring{position:absolute;inset:-14px;border-radius:32px;border:2px solid rgba(72,184,227,0.5);
  animation:ringSpin 7s linear infinite,ringPulse 2.4s ease-in-out infinite;}
@keyframes ringSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes ringPulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.9;transform:scale(1.08)}}
.logo-img{width:88px;height:88px;border-radius:22px;object-fit:cover;display:block;position:relative;z-index:1;
  animation:logoFloat 5.5s ease-in-out infinite,logoGlow 3s ease-in-out infinite alternate;}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-16px) rotate(3deg)}}
@keyframes logoGlow{from{box-shadow:0 10px 28px rgba(72,184,227,.45),0 0 0 2px rgba(255,255,255,.5)}
  to{box-shadow:0 22px 56px rgba(72,184,227,.85),0 0 0 6px rgba(255,255,255,.85)}}

.login-title{font-size:40px;font-weight:800;color:var(--ink);letter-spacing:-1.8px;margin-bottom:10px;
  text-shadow:0 2px 18px rgba(255,255,255,.6);animation:fadeSlideUp .8s var(--smooth) .15s both;}
.login-sub{font-size:14px;color:var(--ink-soft);margin-bottom:46px;letter-spacing:.2px;
  animation:fadeSlideUp .8s var(--smooth) .25s both;}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.name-input{width:100%;padding:15px 22px;background:rgba(255,255,255,0.45);border:1.5px solid rgba(255,255,255,0.7);
  border-radius:16px;color:var(--ink);font-size:15.5px;font-family:inherit;font-weight:600;outline:none;
  text-align:center;letter-spacing:.3px;transition:border-color .25s,background .25s,box-shadow .25s,transform .2s;
  margin-bottom:12px;animation:fadeSlideUp .8s var(--smooth) .35s both;}
.name-input::placeholder{color:rgba(22,38,58,0.40);font-weight:500;}
.name-input:focus{border-color:rgba(47,159,216,.75);background:rgba(255,255,255,0.62);transform:scale(1.015);
  box-shadow:0 0 0 5px rgba(47,159,216,.18);}
.name-input.shake{animation:shake .5s ease;border-color:rgba(230,90,90,.6);}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px) rotate(-1deg)}
  40%{transform:translateX(12px) rotate(1deg)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}

.join-btn{width:100%;padding:15.5px;background:linear-gradient(135deg,var(--blue) 0%,var(--teal) 100%);
  border:none;border-radius:16px;color:#fff;font-size:15.5px;font-weight:700;font-family:inherit;cursor:pointer;
  letter-spacing:.3px;position:relative;overflow:hidden;transition:transform .26s var(--spring),box-shadow .26s;
  box-shadow:0 10px 30px rgba(47,159,216,.40);animation:fadeSlideUp .8s var(--smooth) .45s both,btnIdlePulse 2.8s ease-in-out 1.3s infinite;}
@keyframes btnIdlePulse{0%,100%{box-shadow:0 10px 30px rgba(47,159,216,.40)}50%{box-shadow:0 14px 42px rgba(47,159,216,.62)}}
.join-btn::before{content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,.35) 0%,transparent 60%);}
.join-btn::after{content:'';position:absolute;top:0;left:-120%;width:120%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);transition:left .65s var(--snappy);}
.join-btn:hover{transform:translateY(-4px) scale(1.025);box-shadow:0 22px 52px rgba(47,159,216,.65);}
.join-btn:hover::after{left:120%;}
.join-btn:active{transform:scale(.95);}

/* ══ CHAT CARD ══ */
.chat-card{width:min(620px,100%);height:min(860px,calc(100vh - 32px));border-radius:30px;display:flex;
  flex-direction:column;overflow:hidden;animation:chatEnter .75s var(--smooth) both;position:relative;}
.chat-card::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:5;
  background:radial-gradient(circle at 15% 0%,rgba(255,255,255,.35),transparent 55%);}
@keyframes chatEnter{
  0%{opacity:0;transform:scale(.78) translateY(50px) rotate(-1.5deg);filter:blur(16px);}
  45%{filter:blur(0);}
  72%{transform:scale(1.015) translateY(-4px) rotate(.3deg);}
  100%{opacity:1;transform:scale(1) translateY(0) rotate(0);filter:blur(0);}
}

.chat-header{flex-shrink:0;padding:16px 24px;background:rgba(255,255,255,0.30);
  border-bottom:1px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:6;}
.header-left{display:flex;align-items:center;gap:11px;}
.header-logo{width:30px;height:30px;border-radius:9px;object-fit:cover;flex-shrink:0;
  box-shadow:0 2px 10px rgba(20,60,90,.25);animation:headerLogoSpin 9s linear infinite;}
@keyframes headerLogoSpin{0%,92%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.header-title{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.4px;}
.online-badge{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.40);
  border:1px solid rgba(255,255,255,0.6);padding:6px 14px;border-radius:20px;}
.pulse-dot{width:7px;height:7px;background:#34c97a;border-radius:50%;position:relative;flex-shrink:0;}
.pulse-dot::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.5px solid #34c97a;
  animation:ripple 2.2s ease-out infinite;}
@keyframes ripple{0%{opacity:.85;transform:scale(1)}100%{opacity:0;transform:scale(3.4)}}
.online-txt{font-size:12px;color:var(--ink-soft);font-weight:600;}

.messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 22px 14px;display:flex;flex-direction:column;
  gap:0;position:relative;z-index:6;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:rgba(22,38,58,0.18);border-radius:3px;}
.messages::-webkit-scrollbar-track{background:transparent;}

.msg-group{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px;
  animation:groupEnter .55s var(--smooth) both;}
@keyframes groupEnter{0%{opacity:0;transform:translateY(26px) scale(.9)}
  60%{opacity:1;transform:translateY(-3px) scale(1.015)}100%{transform:translateY(0) scale(1)}}
.msg-group.own{flex-direction:row-reverse;}
.msg-group.other{flex-direction:row;}
.msg-group.tight{margin-bottom:3px;animation:none;}

.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 3px 12px rgba(20,60,90,.30);
  animation:avatarSpring .65s var(--spring) both .05s;}
@keyframes avatarSpring{0%{opacity:0;transform:scale(.15) rotate(-40deg)}
  50%{opacity:1;transform:scale(1.25) rotate(8deg)}72%{transform:scale(.88) rotate(-4deg)}
  88%{transform:scale(1.06) rotate(2deg)}100%{transform:scale(1) rotate(0)}}
.msg-group.own .avatar{display:none;}

.bubble-stack{display:flex;flex-direction:column;gap:3px;max-width:75%;}
.msg-group.own .bubble-stack{align-items:flex-end;}
.msg-group.other .bubble-stack{align-items:flex-start;}
.sender-name{font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;padding:0 5px;}

.bubble{padding:10px 15px;font-size:15px;line-height:1.52;font-weight:500;color:var(--ink);
  word-break:break-word;position:relative;cursor:default;
  transition:transform .22s var(--spring),box-shadow .22s;}
.bubble:hover{transform:scale(1.03) translateY(-1px);}

.msg-group.own .bubble{background:var(--own-bg);border:1px solid var(--own-border);
  box-shadow:0 4px 18px rgba(47,159,216,.22),inset 0 1px 0 rgba(255,255,255,.5);}
.msg-group.other .bubble{background:var(--recv-bg);border:1px solid var(--recv-border);
  box-shadow:0 3px 16px rgba(20,60,90,.10),inset 0 1px 0 rgba(255,255,255,.6);}

.msg-group.own .bubble[data-pos="single"]{border-radius:20px 20px 5px 20px;}
.msg-group.own .bubble[data-pos="first"]{border-radius:20px 20px 5px 20px;}
.msg-group.own .bubble[data-pos="middle"]{border-radius:20px 5px 5px 20px;}
.msg-group.own .bubble[data-pos="last"]{border-radius:20px 5px 20px 20px;}
.msg-group.other .bubble[data-pos="single"]{border-radius:20px 20px 20px 5px;}
.msg-group.other .bubble[data-pos="first"]{border-radius:20px 20px 20px 5px;}
.msg-group.other .bubble[data-pos="middle"]{border-radius:5px 20px 20px 5px;}
.msg-group.other .bubble[data-pos="last"]{border-radius:5px 20px 20px 20px;}

/* Big bouncy bubble-arrival spring */
.msg-group.own .bubble.pop{animation:springRight .68s var(--smooth) both;}
.msg-group.other .bubble.pop{animation:springLeft .68s var(--smooth) both;}
@keyframes springRight{
  0%{opacity:0;transform:translateX(60px) translateY(14px) scale(.45) rotate(7deg);}
  35%{opacity:1;transform:translateX(-12px) translateY(-4px) scale(1.14) rotate(-2deg);}
  55%{transform:translateX(5px) translateY(2px) scale(.95) rotate(1deg);}
  72%{transform:translateX(-3px) scale(1.04) rotate(-.5deg);}
  86%{transform:translateX(1px) scale(.99);}
  100%{transform:translateX(0) translateY(0) scale(1) rotate(0);}
}
@keyframes springLeft{
  0%{opacity:0;transform:translateX(-60px) translateY(14px) scale(.45) rotate(-7deg);}
  35%{opacity:1;transform:translateX(12px) translateY(-4px) scale(1.14) rotate(2deg);}
  55%{transform:translateX(-5px) translateY(2px) scale(.95) rotate(-1deg);}
  72%{transform:translateX(3px) scale(1.04) rotate(.5deg);}
  86%{transform:translateX(-1px) scale(.99);}
  100%{transform:translateX(0) translateY(0) scale(1) rotate(0);}
}

.ts{font-size:11px;color:rgba(22,38,58,.45);margin-top:5px;padding:0 5px;display:flex;align-items:center;gap:4px;}

/* Read receipt checkmarks */
.receipt{display:inline-flex;align-items:center;gap:3px;}
.receipt svg{width:13px;height:13px;}
.receipt .check1{stroke:rgba(22,38,58,.40);}
.receipt .check2{stroke:rgba(22,38,58,.40);}
.receipt.seen .check1,.receipt.seen .check2{stroke:#2f9fd8;}
.receipt path{stroke-dasharray:20;stroke-dashoffset:20;transition:stroke-dashoffset .45s var(--smooth),stroke .3s;}
.receipt.drawn path{stroke-dashoffset:0;}
.receipt.seen path{animation:checkPop .4s var(--spring) both;}
@keyframes checkPop{0%{transform:scale(.5)}60%{transform:scale(1.3)}100%{transform:scale(1)}}

.msg-system{text-align:center;font-size:11.5px;color:var(--ink-soft);font-style:italic;margin:6px 0 14px;
  animation:sysEnter .5s var(--spring) both;}
@keyframes sysEnter{0%{opacity:0;transform:translateY(14px) scale(.85)}
  60%{transform:translateY(-2px) scale(1.05)}100%{opacity:1;transform:translateY(0) scale(1)}}

/* Typing indicator */
.typing-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;animation:groupEnter .4s var(--smooth) both;}
.typing-bubble{background:var(--recv-bg);border:1px solid var(--recv-border);border-radius:20px 20px 20px 5px;
  padding:12px 16px;display:flex;gap:4px;box-shadow:0 3px 16px rgba(20,60,90,.10);}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--ink-soft);
  animation:typingBounce 1.1s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.15s;}
.typing-dot:nth-child(3){animation-delay:.30s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-7px);opacity:1}}

/* Input area */
.input-area{flex-shrink:0;padding:14px 20px 20px;background:rgba(255,255,255,0.28);
  border-top:1px solid rgba(255,255,255,0.5);display:flex;align-items:center;gap:10px;position:relative;z-index:6;}
.msg-input{flex:1;padding:13px 18px;background:rgba(255,255,255,0.42);border:1.5px solid rgba(255,255,255,0.6);
  border-radius:24px;color:var(--ink);font-size:14.5px;font-family:inherit;font-weight:500;outline:none;
  transition:border-color .22s,background .22s,box-shadow .22s,transform .18s;}
.msg-input::placeholder{color:rgba(22,38,58,.40);}
.msg-input:focus{border-color:rgba(47,159,216,.6);background:rgba(255,255,255,0.58);transform:scale(1.01);
  box-shadow:0 0 0 4px rgba(47,159,216,.14);}

.send-btn{width:50px;height:50px;min-width:50px;background:linear-gradient(135deg,var(--blue),var(--teal));
  border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 22px rgba(47,159,216,.46);position:relative;overflow:hidden;
  transition:transform .24s var(--spring),box-shadow .24s;
  animation:sendIdle 2.6s ease-in-out infinite;}
@keyframes sendIdle{0%,100%{box-shadow:0 6px 22px rgba(47,159,216,.46)}50%{box-shadow:0 9px 30px rgba(47,159,216,.62)}}
.send-btn::before{content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(145deg,rgba(255,255,255,.40) 0%,transparent 60%);}
.send-btn svg{width:19px;height:19px;position:relative;z-index:1;}
.send-btn:hover{transform:scale(1.16) rotate(8deg);box-shadow:0 14px 38px rgba(47,159,216,.70);}
.send-btn:active{transform:scale(.84);}
.send-btn.fire{animation:btnFire .58s var(--smooth);}
@keyframes btnFire{0%{transform:scale(1) rotate(0)}16%{transform:scale(.62) rotate(-10deg)}
  42%{transform:scale(1.38) rotate(14deg)}62%{transform:scale(.88) rotate(-6deg)}
  78%{transform:scale(1.1) rotate(3deg)}90%{transform:scale(.96) rotate(-1deg)}
  100%{transform:scale(1) rotate(0)}}

/* Ripple ring from send button */
.ripple-ring{position:fixed;border-radius:50%;border:2px solid rgba(47,159,216,.55);pointer-events:none;
  z-index:998;animation:rippleExpand .7s var(--smooth) forwards;}
@keyframes rippleExpand{0%{width:0;height:0;opacity:.9;}100%{width:340px;height:340px;
  margin-left:-170px;margin-top:-170px;opacity:0;}}
</style>
</head>
<body>

<canvas id="pcanvas"></canvas>
<div id="bg"></div>

<div id="login-screen" class="screen">
  <div class="glass login-card" id="login-card">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <img class="logo-img" src="apple-touch-icon.png" alt="Glass Chat"/>
    </div>
    <h1 class="login-title">Glass Chat</h1>
    <p class="login-sub">A beautiful place to talk</p>
    <input class="name-input" id="name-input" type="text" placeholder="Your name..." maxlength="20" autocomplete="off" spellcheck="false"/>
    <button class="join-btn" id="join-btn">Join Chat</button>
  </div>
</div>

<div id="chat-screen" class="screen hidden">
  <div class="glass chat-card">
    <header class="chat-header">
      <div class="header-left">
        <img class="header-logo" src="favicon-32.png" alt=""/>
        <span class="header-title">Glass Chat</span>
      </div>
      <div class="online-badge">
        <span class="pulse-dot"></span>
        <span class="online-txt" id="online-count">0 online</span>
      </div>
    </header>
    <div class="messages" id="messages"></div>
    <footer class="input-area">
      <input class="msg-input" id="msg-input" type="text" placeholder="Message..." autocomplete="off" spellcheck="false"/>
      <button class="send-btn" id="send-btn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </footer>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.fog.min.js"></script>
<script>
VANTA.FOG({el:'#bg',mouseControls:true,touchControls:true,gyroControls:false,minHeight:200,minWidth:200,
  highlightColor:0x48b8e3,midtoneColor:0xa3cfff,lowlightColor:0x28b1a6,baseColor:0xffffff});
</script>
<script src="/socket.io/socket.io.js"></script>
<script>
/* Particles */
class Particles{
  constructor(c){this.c=c;this.ctx=c.getContext('2d');this.p=[];this.raf=null;this._r();
    window.addEventListener('resize',()=>this._r());}
  _r(){this.c.width=innerWidth;this.c.height=innerHeight;}
  burst(px,py,type){
    const cfg=type==='send'?{n:28,vy:-2.8,spd:[4,10],sz:[2,7],dec:[0.012,0.022],
      cols:['#2f9fd8','#22a89c','#ffffff','#7ee8fa','#c4f0ff','#48b8e3']}:
      {n:16,vy:-1.7,spd:[1.6,5.4],sz:[1.6,4.2],dec:[0.016,0.029],
      cols:['#ffffff','#dff0ff','#bfe6ff','#e8f5ff']};
    for(let i=0;i<cfg.n;i++){
      const a=(Math.PI*2*i/cfg.n)+(Math.random()-0.5)*1.1;
      const s=cfg.spd[0]+Math.random()*(cfg.spd[1]-cfg.spd[0]);
      this.p.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s+cfg.vy,
        r:cfg.sz[0]+Math.random()*(cfg.sz[1]-cfg.sz[0]),a:0.9+Math.random()*0.1,
        col:cfg.cols[Math.floor(Math.random()*cfg.cols.length)],
        dec:cfg.dec[0]+Math.random()*(cfg.dec[1]-cfg.dec[0]),rot:Math.random()*Math.PI});
    }
    if(!this.raf)this._loop();
  }
  _loop(){
    const tick=()=>{
      const{ctx,c}=this;ctx.clearRect(0,0,c.width,c.height);
      this.p=this.p.filter(p=>p.a>0.01);
      for(const p of this.p){
        p.x+=p.vx;p.y+=p.vy;p.vy+=0.13;p.vx*=0.97;p.a-=p.dec;p.r*=0.976;
        ctx.save();ctx.globalAlpha=Math.max(0,p.a);ctx.fillStyle=p.col;
        ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,p.r),0,Math.PI*2);ctx.fill();ctx.restore();
      }
      if(this.p.length){this.raf=requestAnimationFrame(tick);}
      else{this.raf=null;ctx.clearRect(0,0,c.width,c.height);}
    };
    this.raf=requestAnimationFrame(tick);
  }
}
const ps=new Particles(document.getElementById('pcanvas'));

function ripple(x,y){
  const r=document.createElement('div');
  r.className='ripple-ring';r.style.left=x+'px';r.style.top=y+'px';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),720);
}

const socket=io();
let myName='',lastGroupEl=null,lastGroupUser=null,lastGroupTime=0,lastOwnId=null;
const GROUP_GAP=60000;
const AV_COLORS=['#2f9fd8','#22a89c','#8a6fe0','#e08a4f','#3fbf72','#e667a3','#f0964e'];
const userColor=n=>{let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))&0xffff;return AV_COLORS[h%AV_COLORS.length];};
const fmtTime=ts=>new Date(ts||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
function updatePositions(stack){
  const bs=stack.querySelectorAll('.bubble');
  bs.forEach((b,i)=>{b.dataset.pos=bs.length===1?'single':i===0?'first':i===bs.length-1?'last':'middle';});
}
function checkSvg(){
  return '<svg viewBox="0 0 16 16" fill="none"><path class="check1" d="M1 8l4 4 3-4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path class="check2" d="M6 8l4 4 5-7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

const saved=localStorage.getItem('gc_name');
if(saved)document.getElementById('name-input').value=saved;

function joinChat(){
  const inp=document.getElementById('name-input'),name=inp.value.trim();
  if(!name){
    inp.classList.remove('shake');void inp.offsetWidth;inp.classList.add('shake');
    setTimeout(()=>inp.classList.remove('shake'),500);return;
  }
  myName=name;localStorage.setItem('gc_name',name);
  socket.emit('join',name);
  document.getElementById('login-card').classList.add('leaving');
  setTimeout(()=>{
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('chat-screen').classList.remove('hidden');
    document.getElementById('msg-input').focus();
  },420);
}
document.getElementById('join-btn').addEventListener('click',joinChat);
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')joinChat();});

function addMessage(data,isOwn,fromHistory){
  const box=document.getElementById('messages');
  const ts=data.ts||Date.now(),user=data.user;
  const same=lastGroupEl&&lastGroupUser===user&&(ts-lastGroupTime)<GROUP_GAP;
  let group,stack;
  if(same){
    group=lastGroupEl;stack=group.querySelector('.bubble-stack');
    const oldTs=stack.querySelector('.ts');if(oldTs)oldTs.remove();
    group.classList.add('tight');
  }else{
    group=document.createElement('div');
    group.className=`msg-group ${isOwn?'own':'other'}`;
    if(!isOwn){
      const av=document.createElement('div');
      av.className='avatar';av.style.background=userColor(user);
      av.textContent=user[0].toUpperCase();group.appendChild(av);
    }
    stack=document.createElement('div');stack.className='bubble-stack';
    if(!isOwn){
      const nm=document.createElement('div');nm.className='sender-name';nm.textContent=user;
      stack.appendChild(nm);
    }
    group.appendChild(stack);box.appendChild(group);
  }
  const bubble=document.createElement('div');
  bubble.className='bubble'+(fromHistory?'':' pop');
  bubble.textContent=data.text;bubble.dataset.id=data.id||'';
  stack.appendChild(bubble);

  const tsEl=document.createElement('div');tsEl.className='ts';
  tsEl.textContent=fmtTime(ts);
  if(isOwn){
    const rc=document.createElement('span');
    rc.className='receipt';rc.dataset.id=data.id||'';
    rc.innerHTML=checkSvg();
    tsEl.appendChild(rc);
    requestAnimationFrame(()=>rc.classList.add('drawn'));
    if(data.seenBy&&data.seenBy.length){rc.classList.add('seen');}
    lastOwnId=data.id;
  }
  stack.appendChild(tsEl);
  updatePositions(stack);
  lastGroupEl=group;lastGroupUser=user;lastGroupTime=ts;
  box.scrollTop=box.scrollHeight;

  if(!isOwn&&data.id)socket.emit('seen',{id:data.id,reader:myName});
}

function addSystem(text){
  const box=document.getElementById('messages');
  const div=document.createElement('div');div.className='msg-system';div.textContent=text;
  box.appendChild(div);box.scrollTop=box.scrollHeight;lastGroupEl=null;lastGroupUser=null;
}

function sendMsg(){
  const inp=document.getElementById('msg-input'),text=inp.value.trim();
  if(!text||!myName)return;
  socket.emit('message',{user:myName,text});inp.value='';
  const btn=document.getElementById('send-btn');
  const r=btn.getBoundingClientRect();
  ps.burst(r.left+r.width/2,r.top+r.height/2,'send');
  ripple(r.left+r.width/2,r.top+r.height/2);
  btn.classList.remove('fire');void btn.offsetWidth;btn.classList.add('fire');
}
document.getElementById('send-btn').addEventListener('click',sendMsg);
document.getElementById('msg-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg();});

socket.on('history',msgs=>{
  const box=document.getElementById('messages');box.innerHTML='';
  lastGroupEl=null;lastGroupUser=null;
  msgs.forEach(m=>addMessage(m,m.user===myName,true));
});
socket.on('message',data=>{
  const isOwn=data.socketId===socket.id;
  addMessage(data,isOwn,false);
  if(!isOwn){
    const r=document.getElementById('messages').getBoundingClientRect();
    ps.burst(r.left+70,r.bottom-85,'recv');
  }
});
socket.on('seen-update',({id,reader})=>{
  const rc=document.querySelector(`.receipt[data-id="${id}"]`);
  if(rc&&!rc.classList.contains('seen'))rc.classList.add('seen');
});
socket.on('system',text=>addSystem(text));
socket.on('user-count',n=>{document.getElementById('online-count').textContent=`${n} online`;});
</script>
</body>
</html>
